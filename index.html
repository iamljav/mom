<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>—</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>

    <section id="mode-section">
      <div class="mode-cards">

        <div class="mode-card" id="mode-single">
          <div class="mode-card-inner">
            <div class="mode-icon">
              <svg viewBox="0 0 48 48" fill="none"><rect x="8" y="10" width="32" height="28" rx="1" stroke="currentColor" stroke-width="0.8"/><circle cx="18" cy="22" r="4" stroke="currentColor" stroke-width="0.8"/><path d="M8 32L18 23L26 30L33 22L40 32" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round"/></svg>
            </div>
            <p class="mode-name">Single exposure</p>
            <p class="mode-desc">one photograph, corrupted</p>
          </div>
        </div>

        <div class="mode-card" id="mode-double">
          <div class="mode-card-inner">
            <div class="mode-icon mode-icon-double">
              <svg viewBox="0 0 48 48" fill="none"><rect x="4" y="10" width="32" height="28" rx="1" stroke="currentColor" stroke-width="0.8" opacity="0.4"/><rect x="12" y="14" width="32" height="28" rx="1" stroke="currentColor" stroke-width="0.8"/><circle cx="26" cy="26" r="4" stroke="currentColor" stroke-width="0.8"/></svg>
            </div>
            <p class="mode-name">Double exposure</p>
            <p class="mode-desc">two memories, one surface</p>
          </div>
        </div>

      </div>
    </section>

    <section id="single-section" style="display:none">
      <div class="upload-zone" id="single-zone">
        <input type="file" id="single-input" accept="image/*">
        <div class="upload-inner">
          <div class="upload-icon">
            <svg viewBox="0 0 48 48" fill="none"><rect x="6" y="10" width="36" height="28" rx="1" stroke="currentColor" stroke-width="0.75"/><circle cx="17" cy="21" r="4" stroke="currentColor" stroke-width="0.75"/><path d="M6 31L17 22L25 29L33 20L42 31" stroke="currentColor" stroke-width="0.75" stroke-linejoin="round"/></svg>
          </div>
          <p class="upload-label">drag & drop · click to browse</p>
          <p class="upload-formats">jpg · png · webp</p>
        </div>
      </div>
      <button class="btn btn-back" id="single-back">←</button>
    </section>

    <section id="double-section" style="display:none">
      <div class="double-slots">

        <div class="slot">
          <div class="upload-zone" id="zone-a">
            <input type="file" id="input-a" accept="image/*">
            <div class="upload-inner">
              <div class="upload-icon">
                <svg viewBox="0 0 48 48" fill="none"><rect x="6" y="10" width="36" height="28" rx="1" stroke="currentColor" stroke-width="0.75"/><circle cx="17" cy="21" r="4" stroke="currentColor" stroke-width="0.75"/><path d="M6 31L17 22L25 29L33 20L42 31" stroke="currentColor" stroke-width="0.75" stroke-linejoin="round"/></svg>
              </div>
              <p class="upload-label">first photograph</p>
              <p class="upload-formats">jpg · png · webp</p>
            </div>
          </div>
          <div class="slot-thumb" id="thumb-a" style="display:none">
            <img id="thumb-img-a" alt="">
            <button class="slot-clear" id="clear-a">×</button>
          </div>
        </div>

        <div class="slot">
          <div class="upload-zone" id="zone-b">
            <input type="file" id="input-b" accept="image/*">
            <div class="upload-inner">
              <div class="upload-icon">
                <svg viewBox="0 0 48 48" fill="none"><rect x="6" y="10" width="36" height="28" rx="1" stroke="currentColor" stroke-width="0.75"/><circle cx="17" cy="21" r="4" stroke="currentColor" stroke-width="0.75"/><path d="M6 31L17 22L25 29L33 20L42 31" stroke="currentColor" stroke-width="0.75" stroke-linejoin="round"/></svg>
              </div>
              <p class="upload-label">second photograph</p>
              <p class="upload-formats">jpg · png · webp</p>
            </div>
          </div>
          <div class="slot-thumb" id="thumb-b" style="display:none">
            <img id="thumb-img-b" alt="">
            <button class="slot-clear" id="clear-b">×</button>
          </div>
        </div>

      </div>
      <div class="double-actions">
        <button class="btn btn-back" id="double-back">←</button>
        <button class="btn btn-develop" id="develop-btn" disabled>→</button>
      </div>
    </section>

    <section id="result-section" style="display:none">
      <div class="canvas-frame">
        <canvas id="canvas"></canvas>
        <div class="developing" id="developing"></div>
      </div>
      <div class="result-footer">
        <button id="another-btn" class="btn-action">↩</button>
        <button id="save-btn" class="btn-action">↓</button>
      </div>
    </section>

  </main>

  <script src="corruption.js"></script>
  <script src="app.js"></script>
</body>
</html>
